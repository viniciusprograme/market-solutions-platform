{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de 20 Perguntas</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="form-header">
            <h1>Formulário de Pesquisa</h1>
            <p>Por favor, responda as 20 perguntas abaixo</p>
        </div>

        <form id="questionnaireForm" class="questionnaire-form">
            <div class="form-group">
                <label for="q1">1. Qual é o seu nome?</label>
                <input type="text" id="q1" name="q1" placeholder="Digite seu nome" required>
            </div>

            <div class="form-group">
                <label for="q2">2. Qual é a sua idade?</label>
                <input type="number" id="q2" name="q2" placeholder="Digite sua idade" min="18" required>
            </div>

            <div class="form-group">
                <label for="q3">3. Qual é a sua profissão?</label>
                <input type="text" id="q3" name="q3" placeholder="Digite sua profissão" required>
            </div>

            <div class="form-group">
                <label for="q4">4. Você utiliza tecnologia diariamente?</label>
                <select id="q4" name="q4" required>
                    <option value="">Selecione uma opção</option>
                    <option value="sempre">Sempre</option>
                    <option value="frequentemente">Frequentemente</option>
                    <option value="raramente">Raramente</option>
                    <option value="nunca">Nunca</option>
                </select>
            </div>

            <div class="form-group">
                <label>5. Qual é o seu nível de escolaridade?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q5" value="fundamental"> Ensino Fundamental</label>
                    <label><input type="radio" name="q5" value="medio"> Ensino Médio</label>
                    <label><input type="radio" name="q5" value="superior"> Ensino Superior</label>
                    <label><input type="radio" name="q5" value="pos"> Pós-graduação</label>
                </div>
            </div>

            <div class="form-group">
                <label for="q6">6. Em qual região você atua?</label>
                <input type="text" id="q6" name="q6" placeholder="Digite sua região" required>
            </div>

            <div class="form-group">
                <label>7. Qual é seu interesse em inovação?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q7" value="muito"> Muito Interessado</label>
                    <label><input type="radio" name="q7" value="pouco"> Pouco Interessado</label>
                    <label><input type="radio" name="q7" value="nao"> Não Interessado</label>
                </div>
            </div>

            <div class="form-group">
                <label for="q8">8. Quantas horas por semana você dedica ao aprendizado?</label>
                <input type="number" id="q8" name="q8" placeholder="Digite o número de horas" min="0" required>
            </div>

            <div class="form-group">
                <label for="q9">9. Qual é o seu principal desafio profissional?</label>
                <textarea id="q9" name="q9" placeholder="Descreva brevemente seu desafio" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label>10. Você já participou de projetos em equipe?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q10" value="sim"> Sim</label>
                    <label><input type="radio" name="q10" value="nao"> Não</label>
                </div>
            </div>

            <div class="form-group">
                <label for="q11">11. Qual é sua experiência em anos?</label>
                <input type="number" id="q11" name="q11" placeholder="Digite em anos" min="0" required>
            </div>

            <div class="form-group">
                <label for="q12">12. Que ferramentas você domina?</label>
                <input type="text" id="q12" name="q12" placeholder="Digite as ferramentas separadas por vírgula" required>
            </div>

            <div class="form-group">
                <label>13. Qual é seu nível de satisfação com seu trabalho atual?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q13" value="muito"> Muito Satisfeito</label>
                    <label><input type="radio" name="q13" value="moderado"> Moderadamente Satisfeito</label>
                    <label><input type="radio" name="q13" value="insatisfeito"> Insatisfeito</label>
                </div>
            </div>

            <div class="form-group">
                <label for="q14">14. Qual é sua renda mensal aproximada?</label>
                <select id="q14" name="q14" required>
                    <option value="">Selecione uma faixa</option>
                    <option value="ate2000">Até R$ 2.000</option>
                    <option value="2000-5000">R$ 2.000 - R$ 5.000</option>
                    <option value="5000-10000">R$ 5.000 - R$ 10.000</option>
                    <option value="acima10000">Acima de R$ 10.000</option>
                </select>
            </div>

            <div class="form-group">
                <label>15. Você pretende mudar de carreira nos próximos 2 anos?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q15" value="sim"> Sim</label>
                    <label><input type="radio" name="q15" value="talvez"> Talvez</label>
                    <label><input type="radio" name="q15" value="nao"> Não</label>
                </div>
            </div>

            <div class="form-group">
                <label for="q16">16. Qual é seu objetivo principal no próximo ano?</label>
                <textarea id="q16" name="q16" placeholder="Descreva seu objetivo" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label for="q17">17. Você possui redes profissionais ativas?</label>
                <select id="q17" name="q17" required>
                    <option value="">Selecione uma opção</option>
                    <option value="linkedin">LinkedIn</option>
                    <option value="github">GitHub</option>
                    <option value="ambas">Ambas</option>
                    <option value="nenhuma">Nenhuma</option>
                </select>
            </div>

            <div class="form-group">
                <label>18. Com que frequência você se atualiza sobre tendências?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q18" value="diaria"> Diariamente</label>
                    <label><input type="radio" name="q18" value="semanal"> Semanalmente</label>
                    <label><input type="radio" name="q18" value="mensal"> Mensalmente</label>
                    <label><input type="radio" name="q18" value="raramente"> Raramente</label>
                </div>
            </div>

            <div class="form-group">
                <label for="q19">19. Qual é o setor que mais te interessa?</label>
                <input type="text" id="q19" name="q19" placeholder="Digite o setor de interesse" required>
            </div>

            <div class="form-group">
                <label>20. Você gostaria de receber mais informações?</label>
                <div class="radio-group">
                    <label><input type="radio" name="q20" value="sim"> Sim</label>
                    <label><input type="radio" name="q20" value="nao"> Não</label>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Enviar Formulário</button>
                <button type="reset" class="btn-reset">Limpar Formulário</button>
            </div>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
            <h2>Sucesso!</h2>
            <p>Seu formulário foi enviado com sucesso.</p>
        </div>
    </div>

    <script>
        document.getElementById('questionnaireForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Coletar dados do formulário
            const formData = new FormData(this);
            const data = {};
            for (let [key, value] of formData) {
                data[key] = value;
            }

            try {
                // Enviar dados para o servidor
                const response = await fetch('/submit/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // Esconder formulário e mostrar mensagem de sucesso
                    document.getElementById('questionnaireForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';

                    // Scroll para o topo
                    window.scrollTo(0, 0);
                } else {
                    alert('Erro ao enviar o formulário. Tente novamente.');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar ao servidor.');
            }
        });
    </script>
</body>
</html>
